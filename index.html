<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Quái Vật</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <section class="screen screen--login active" id="loginScreen">
      <div class="card">
        <h1>Chào mừng!</h1>
        <p class="hint">Nhập mật khẩu với gợi ý: <strong>our first day together</strong></p>
        <div class="field">
          <input id="passwordInput" type="password" placeholder="Mật khẩu..." />
        </div>
        <button id="loginBtn">Đăng nhập</button>
        <p class="message" id="loginMessage"></p>
      </div>
    </section>

    <section class="screen screen--game" id="gameScreen">
      <div class="game-stage">
        <div class="hero-area">
          <img id="heroIcon" class="hero-image" src="hero.png" alt="Hero" />
          <h2>Duy Đinh</h2>
          <p class="hero-caption">Click vào quái vật để bắn đạn từ vị trí của bạn.</p>
          <button id="restartBtn">Chơi lại</button>
        </div>

        <div class="battle-area" id="battleArea">
          <div class="battle-hint">Quái vật đang xâm chiếm không gian...</div>
          <div class="monsters" id="monsters"></div>
        </div>
      </div>

      <div class="status-bar">
        <p id="statusText">Tiêu diệt cả 3 quái vật!</p>
      </div>
    </section>

    <div class="popup-overlay" id="victoryPopup">
      <div class="fireworks" id="fireworks"></div>
      <div class="popup">
        <span class="popup-icon">🎉</span>
        <h2>Yehh thắng rùii!</h2>
        <p>Chúc anh thi tốt nhéee!!</p>
        <button id="victoryRestartBtn">Chơi lại</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
